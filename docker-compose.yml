services:
  db:
    image: mysql:8.0
    container_name: task-manager-db
    restart: always
    environment:
      MYSQL_DATABASE: task_manager
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - dbdata:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: task-manager-backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_ENV: production
      APP_DEBUG: false
      APP_KEY: base64:dGhpcyBpcyBhIHRlc3Qga2V5IGZvciBkZXY=
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: task_manager
      DB_USERNAME: root
      DB_PASSWORD: root
    expose:
      - "8000"

  frontend:
    build: ./frontend
    container_name: task-manager-frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  dbdata:
